<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0d0b09"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#722f37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#722f37"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#glow)"/>

  <!-- Ambient glow behind icon -->
  <circle cx="200" cy="200" r="80" fill="#722f37" opacity="0.05" filter="url(#blur)"/>

  <!-- Decorative top line -->
  <rect x="100" y="60" width="200" height="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="200" y="90" text-anchor="middle" fill="#7a6e5f" 
        font-family="'Georgia', serif" font-size="11" letter-spacing="4" opacity="0.6">
    375 МЛ
  </text>

  <!-- Icon area -->
  <g transform="translate(200, 220)">
    
        <ellipse cx="0" cy="-30" rx="28" ry="35" fill="none" stroke="#722f37" stroke-width="1.5" opacity="0.55"/>
        <line x1="0" y1="5" x2="0" y2="30" stroke="#722f37" stroke-width="2" opacity="0.5"/>
        <ellipse cx="0" cy="35" rx="18" ry="6" fill="none" stroke="#722f37" stroke-width="1" opacity="0.4"/>
        <ellipse cx="0" cy="-10" rx="20" ry="18" fill="#722f37" opacity="0.08"/>
    
  </g>

  <!-- Decorative line -->
  <rect x="120" y="340" width="160" height="1" fill="url(#accent)" opacity="0.25"/>

  <!-- Product name -->
  <text x="200" y="380" text-anchor="middle" fill="#f5efe6" 
        font-family="'Georgia', serif" font-size="18" font-weight="600" letter-spacing="0.5">
    Червено вино
  </text>

  <!-- Bottom branding -->
  <text x="200" y="460" text-anchor="middle" fill="#7a6e5f" 
        font-family="'Georgia', serif" font-size="8" letter-spacing="3" opacity="0.35">
    DRIFT BAR PLOVDIV
  </text>

  <!-- Corner accents -->
  <path d="M 20 30 L 20 20 L 30 20" stroke="#722f37" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 370 30 L 380 20 L 380 30" stroke="#722f37" stroke-width="1" fill="none" opacity="0.2" transform="translate(0,0)"/>
  <path d="M 20 470 L 20 480 L 30 480" stroke="#722f37" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 370 480 L 380 480 L 380 470" stroke="#722f37" stroke-width="1" fill="none" opacity="0.2"/>
</svg>