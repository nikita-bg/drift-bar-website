<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0d0b09"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2d5a3d" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#2d5a3d"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#glow)"/>

  <!-- Ambient glow behind icon -->
  <circle cx="200" cy="200" r="80" fill="#2d5a3d" opacity="0.05" filter="url(#blur)"/>

  <!-- Decorative top line -->
  <rect x="100" y="60" width="200" height="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="200" y="90" text-anchor="middle" fill="#7a6e5f" 
        font-family="'Georgia', serif" font-size="11" letter-spacing="4" opacity="0.6">
    ДЖИН 50 МЛ
  </text>

  <!-- Icon area -->
  <g transform="translate(200, 220)">
    
        <path d="M -16 25 L -16 -55 Q -16 -70 0 -70 Q 16 -70 16 -55 L 16 25 Z" fill="none" stroke="#2d5a3d" stroke-width="1.5" opacity="0.5"/>
        <rect x="-6" y="-82" width="12" height="14" rx="2" fill="none" stroke="#2d5a3d" stroke-width="1" opacity="0.4"/>
        <circle cx="0" cy="-92" r="5" fill="none" stroke="#2d5a3d" stroke-width="1" opacity="0.3"/>
        <circle cx="0" cy="-20" r="12" fill="none" stroke="#2d5a3d" stroke-width="0.8" opacity="0.3"/>
        <text x="0" y="-17" text-anchor="middle" fill="#2d5a3d" font-size="5" font-family="Georgia" opacity="0.4">GIN</text>
    
  </g>

  <!-- Decorative line -->
  <rect x="120" y="340" width="160" height="1" fill="url(#accent)" opacity="0.25"/>

  <!-- Product name -->
  <text x="200" y="380" text-anchor="middle" fill="#f5efe6" 
        font-family="'Georgia', serif" font-size="18" font-weight="600" letter-spacing="0.5">
    Savoy
  </text>

  <!-- Bottom branding -->
  <text x="200" y="460" text-anchor="middle" fill="#7a6e5f" 
        font-family="'Georgia', serif" font-size="8" letter-spacing="3" opacity="0.35">
    DRIFT BAR PLOVDIV
  </text>

  <!-- Corner accents -->
  <path d="M 20 30 L 20 20 L 30 20" stroke="#2d5a3d" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 370 30 L 380 20 L 380 30" stroke="#2d5a3d" stroke-width="1" fill="none" opacity="0.2" transform="translate(0,0)"/>
  <path d="M 20 470 L 20 480 L 30 480" stroke="#2d5a3d" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 370 480 L 380 480 L 380 470" stroke="#2d5a3d" stroke-width="1" fill="none" opacity="0.2"/>
</svg>