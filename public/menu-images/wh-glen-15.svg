<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0d0b09"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c77d2e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#c77d2e"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#glow)"/>

  <!-- Ambient glow behind icon -->
  <circle cx="200" cy="200" r="80" fill="#c77d2e" opacity="0.05" filter="url(#blur)"/>

  <!-- Decorative top line -->
  <rect x="100" y="60" width="200" height="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="200" y="90" text-anchor="middle" fill="#7a6e5f" 
        font-family="'Georgia', serif" font-size="11" letter-spacing="4" opacity="0.6">
    ОТЛЕЖАЛО 50 МЛ
  </text>

  <!-- Icon area -->
  <g transform="translate(200, 220)">
    
        <rect x="-18" y="-70" width="36" height="95" rx="3" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
        <rect x="-12" y="-85" width="24" height="18" rx="2" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
        <rect x="-8" y="-92" width="16" height="10" rx="4" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
        <rect x="-14" y="-40" width="28" height="35" rx="1" fill="#d4af37" opacity="0.08"/>
        <line x1="-10" y1="-25" x2="10" y2="-25" stroke="#d4af37" stroke-width="0.8" opacity="0.3"/>
        <line x1="-8" y1="-18" x2="8" y2="-18" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    
  </g>

  <!-- Decorative line -->
  <rect x="120" y="340" width="160" height="1" fill="url(#accent)" opacity="0.25"/>

  <!-- Product name -->
  <text x="200" y="380" text-anchor="middle" fill="#f5efe6" 
        font-family="'Georgia', serif" font-size="18" font-weight="600" letter-spacing="0.5">
    Glenfiddich 15
  </text>

  <!-- Bottom branding -->
  <text x="200" y="460" text-anchor="middle" fill="#7a6e5f" 
        font-family="'Georgia', serif" font-size="8" letter-spacing="3" opacity="0.35">
    DRIFT BAR PLOVDIV
  </text>

  <!-- Corner accents -->
  <path d="M 20 30 L 20 20 L 30 20" stroke="#c77d2e" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 370 30 L 380 20 L 380 30" stroke="#c77d2e" stroke-width="1" fill="none" opacity="0.2" transform="translate(0,0)"/>
  <path d="M 20 470 L 20 480 L 30 480" stroke="#c77d2e" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 370 480 L 380 480 L 380 470" stroke="#c77d2e" stroke-width="1" fill="none" opacity="0.2"/>
</svg>